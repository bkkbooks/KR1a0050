body:
  text: 丙子學易編跋此書係借聞徳坊周家書肆所鬻者天寒日短老眼昏花併日而抄其可取者故不能端楷秀巖乃隆山之子其書取王弼張横渠程伊川郭子和朱晦菴而求其是又以其父隆山之説證之或又附以已見中間盡有可取泰定元年嵗在甲子十一月十八日石澗老人俞琰書扵梅齋西塾
