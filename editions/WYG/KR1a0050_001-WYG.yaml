body:
  text: 丙子學易編宋李心傳撰先儒謂上經天道下經人道晉韓康伯非之當矣程子復論分上下經之故具說甚詳晦菴則以為簡帙重大而已信斯言也則諸卦自可平分為二曷為多寡之不齊乎愚甞考之上下篇之卦數雖不齊而反復觀之皆為十有八故繫辭傳亦言二篇之䇿則其來蓋逺未為无意也見羣龍无首自王氏以來皆以三字為句郭立之獨以五字為句晦菴又推言之其義甚美但羣龍无首於象未為吉爾先君子曰此即天徳不可為首者也考之古書无母通用則无首者戒之之辭以利永貞之例推之亦當如此也先君子曰易之三畫三才自然之數也參之則九兩之則六聖人以九六名爻者雖起於倚數而參之揲蓍之餘數與五行之行數亦无不合焉擊辭傳中論數之文盡於此矣鄭氏曰媾猶會也先君子曰屯六二近初九之陽而正應在五然震之性動而趨上竟舎初而歸五蒙六三近九二之陽而正應在上然坎之性陷而趨下乃舎上而求二先君子論卦畫詳明如此先儒所未及也先君子曰二以誠實居中理固得矣而先後二隂陷之故窒塞而不通惕懼而不安訟而見抑者必懲創而無他慮訟而獲勝者將滿假而有後憂故歸而逋其邑人三百户是因訟而有失也然而無眚者禍止此也或錫之鞶带是因訟而有得也然而三禠之者憂未己也先儒之說於義固安但辭若未順耳鄭氏曰小國之下大夫采地方一成其定稅三百家故三百户也王氏以貞厲為句程子以厲終吉為句晦菴又以厲字自為句其讀最善葆光處士張舜元名弼莆陽人紹聖中時命為泉州州學敎授闕荆公曰律如同律聴軍聲之律法律之律三代未有律書曰六律為萬事根本其於兵械尤所重武王伐紂吹律聽聲張子以輿尸為不一先君子曰或者不一也先君子曰軍事出則尚右故旋反為左次也春秋左傳師三宿為次先君子曰六五寛柔之主以之興師則不暴以之任将則疑於无斷故有輿尸之戒有禽徐氏本作擒愚謂以恒九四田无禽例之則所謂有禽當為動而有獲之象唐章懐太子云坤為土缶之象坎為水雨之象坎在坤故曰有孚盈缶王肅本匪人下有凶字卦辭連卦名者四履也否也同人也艮也此皆无義但有反耳否下三字疑衍素履往即中庸所謂素位而行者也獨行願即中庸所謂不願乎其外者也張子以為素潔葢從王氏而失之考祥古本或作考詳晁氏曰荀作詳審也文意尤順郭璞洞林讀至彚字絶句先君子曰卦言來者謂天氣之下降爻言往者謂君子之上亨卦以氣言爻以位升也鄭氏曰莽叢木也大阜曰陵門外之治義掩恩故柔弱則往吝門内之治恩掩義故剛者又戒以不可堅貞也禇氏曰八月觀也過王肅音戈禮記緇衣篇引此爻辭而貞作偵鄭注偵問也恐誤遯釋文又作遁同隱退也先君子曰卦下故曰尾譬之他卦以足趾為喻者也止而不許則可以免禍此乃所以為隂柔之戒愚案此卦四陽爻皆以遯隂為義二隂爻皆以繫陽為義而先儒一之惟先君子以畫言故得經世意也又以既未濟首尾之象觀之此説尤順上三爻曰好曰嘉曰肥取義皆一但愈逺則愈貴耳子夏傳肥饒裕也文選張平子思𤣥賦利飛遯以保名五臣注遯上九飛遯无不利九師道訓曰遯而能飛吉孰大焉先君子曰易中以大名卦者凡三皆陽畫四而隂畫二孔頴達曰說文云耐者須也謂頤下之毛象形字也古者犯罪髠其須謂之耐罪故字從寸寸為法也古字亦有誤不安寸直作而字者鄭氏讀連如字云遲乆之意陸璣毛詩草木鳥獸蟲魚䟽云隼鷂也賈氏周禮䟽云離為日日圎巽為木木器圎簋象其穿鑿如此己事虞氏作祀事先君子曰三以隂居陽震動不安有凶之象先君子曰益用凶事如周禮以委積待凶荒以荒禮哀凶札者也益之為卦初則可以用之於大事二則可以用之於大禮三則可以用之於大災四則可以用之於大遷厚下之益无所不利立心勿恒猶云不恒其徳非謂不令如是也先君子曰天下之事不至於決則不通故雜卦之次序與十三卦之制器尚象皆終乎夬告自邑與泰上九自邑告命之意同蓋欲決小人而命出於下則權柄移而不可以即戎矣夬之初九歐公曰聖人之用剛常深戒於其初先君子曰此以戒君子之未得位而憤性以決小人者也張子程子以行止皆凶釋之愚謂當決之時而四以陽居隂失位不進臀无膚其行次且矣似不必分也四兊體羊也牽與姤柔道牽也同義言引而進也衆陽共決一隂之時四能自引以進則可亡悔然非有剛明之才必不能信也先君子曰此爻與大壯九四爻位皆同而吉凶不同者彼震體此兊體也愚謂君子去小人固當從容謹重以圗全不可遲疑退縮以招悔故爻辭有牽羊之悔鄭氏曰齋咨嗟歎之辭也馬氏曰悲怨之聲晁氏曰咨虞作資云賻也鄭氏曰自目曰涕自鼻目洟用見大人荆公程子皆云用此道以見大人困于酒食與不為酒困之困同鄭氏曰二據初辰在未未為土此二為大夫有地之象未上值天厨酒食象困于酒食者采地薄不足用也二至四為離火火色赤故云朱紱漢儒象學拘泥如此朱紱方來與軒冕儻來之來同釋文曰蒺藜茨草荀爽王肅陸績本劓刖作臲􅑶云不安貌鄭氏曰劓刖當作倪㐳晁氏曰案象數當作臲􅑶古文作倪㐳臲􅑶說文作劓􅝨云不安也薛氏作㓷杌公餗猶言公饍先君子曰震六爻陽爻震物者也隂爻被震者也王氏曰斧所以斫除荆􅁄以安客舎者案子夏傳及諸家資斧並作齊斧惟宋文帝元嘉二十九年詔陳霸先檄與王氏本同張軌曰齊斧黄鉞斧也虞喜志林曰齊當作齋齋戒入廟而受斧也居豐而有慶譽易也在旅而有譽命可謂難矣張珍甫曰此卦火以不炎為利水以不洩為利倉頡篇云鬼逺也顔師古注漢書云鬼方言其幽昧也張子曰變言其著化言其漸晦菴先生曰變者化之漸化者變之成二說不同愚以經考之有自化而至於變如繫辭傳化而裁之謂之變者是也此即張子之說有自變而至於化者中庸動則變變則化者是也此即晦菴之意又晦菴又言當通觀之乃可即此意也游定夫曰應地无疆指君子攸行言之也卦辭言元亨利貞者六乾也屯也隨也臨也无安也革也傳獨於乾析為四徳而自屯以下言大亨貞者二自臨以下言大亨以正者三晦菴曰自屯以下釋元亨利貞乃用文王本意得之矣利建侯即書所謂建侯樹屏詩所謂建爾元子俾侯于魯者也易言利涉大川者九卦辭七需同人蠱大畜益渙中孚也爻辭二頤上九未濟九三也言用涉大川者一謙初六也言不利涉大川者一訟也言不可涉大川者一頤六五也言利見大人者七卦辭四訟蹇萃巽也爻辭三乾九二九五蹇上六也言用見大人者一升也言剛中而應者凡五師也臨也下應上也无妄也萃也升也上應下也以卦論之二五相應者凡三十聖人惟於此五卦言之畧舉以明義也必為之說則鑿矣後夫謂上六乗陽无順從之義張子曰凡言亨者皆陽也言光明言尊而光皆以艮止取義剛應謂四為羣隂所應需於利渉言有功此言有事有功者需之之乆必有其功也有事者亂之之極方進而有所事也乾行以理言天行以氣言此又不可不辨蠱剝復言天行義同設險如秦闗劒閣以至城郭溝池之類皆是方城漢水乃地險耳終則有始蠱與恒兩言之其義蓋同咸恒萃皆兼天地萬物言之其專指天地而言則復與大壯而已先君子曰巽離皆女子之卦而在離則論女在巽則論男豈非専取畫而生義乎小事吉與小過傅同程氏以卦才之善釋之似非也王氏曰易背為止以明背即止也晁氏曰止字當依卦辭作背王弼妄為之說虞翻輩何得无一言蓋是時尚未錯謬也王肅本女歸吉也作女歸吉利貞晁氏曰虞亦无也字先君子曰傳因渉川而論乗木者凡三卦惟此言有功蓋木行水上獨此象為著也故繫辭傳曰舟楫之利以濟不通蓋取諸渙志行正惟此與臨之爻兩言之以貴下賤非獨此爻也傳以始變之卦故一明之耳乗剛之義傳凡五言之屯二豫五噬嗑二困三震二而彖傳又有柔乗剛柔乗五剛蓋舉其重不必盡見也郭京云甞見王輔嗣親筆鹿作麓以從禽上有何字晦菴疑其妄案王肅本己作麓京豈用之歟小畜彖傳言施未行則是全未得行之意此但為未光耳若頤之六四則施光矣何可長也凡四言之此爻與豫之上六中孚之上九皆戒之之意若否之上九則幸之之辭也行不順也晦菴曰順當作慎蓋順慎古字通用荀子順墨作慎墨順巽之義此及漸六四家人六二凡三言之巽體此與家人則但取其義耳不言天上有雲而言雲上於天見其氣之上升也未失常於師六四再言之皆一意也以九居五正而又中者也屯之時不足以當此義故於需與訟明之若豫與晉之六二則柔之中正者也姤與井之九五皆直言卦徳故无以字需上六與隨初九同皆變而不失正者王肅曰畜養也舉爻者凡三十有二初凡五比大有觀渙中孚二凡八頤恒大壯明夷家人井解損四凡二賁兊五凡八豫賁大畜離姤損豐巽上凡九履豫大有坎井鼎歸妹旅兊而六二之吉凡再言之明夷家人九二貞吉凡三言之大牡解未濟六五之吉凡四言之賁大畜離豐惟履豫井鼎旅之辭取在上之義其他未必皆有意位正中凡三言之比隨巽之九五皆同上合志此與大畜九三升初六凡三言之皆謂上與陽爻合也損初六尚合志同位不當凡十六惟晉夬萃豐小過為以九居四大壯以六居五餘皆以六居三履否豫臨噬嗑睽震兊中孚未濟也然爻位不當者蓋不止此聖人亦隨事明之耳志行此及否睽未濟之九四凡四言之豈非謂其離下而進於上乎位正當此及否兊中孚之九五亦四言之孚于剥之屬正與此同否中孚又自有意説具本卦或言有慶或言往有慶而大有慶者獨於此爻與頤之上九言之其吉可知矣志在外此與咸初六渙六三言之皆内外之相應者渙六四言光大也雖无以字義與此同中以行願此中字恐與上爻中心之中同又誰咎凡三言之在解與莭者其意不同說具本卦困九五亦云中直也義與此同志末得案謙之上六困之九五義與此同說具本卦易而無備也晦菴曰太柔則人將易之而無畏備之心愚案此説本出程子然以爻論之柔得尊位大中則不失於弱矣張子曰君子至平易有何闗防疑備惟以抑抑威儀維徳之隅儼然人望而畏之既易而无備則威如乃吉也此雖王氏舊說於文則順矣巽上六亦云上窮皆謂在上而極耳傳言得中道凡四離以六居二固得中矣而比爻與解夬皆以九居二是以陽居隂為得中也豈非所謂時中者歟既濟六二與此同咎不長大壯上六同此意行中疑與泰爻辭中行同意志在内此及蹇之上六兩言之内謂内卦亦可醜與解之六三同其義一耳未失道與睽九二同釋文云勅俗字也字林作敕不行也一本上或有止字未光也與震九四兊上六三言之未光也本或作未光大也聰不明也與夬九四同豈非澤上于天亦為水涸之象乎終无尤此及剥六五蹇旅六二鼎九二凡五言之尤罪自外至者也故守正則无尤矣大畜六四升九二皆以有喜贊之此爻為能求賢以自助是可喜也象言君子五十三言先王七比豫觀噬嗑復无妄渙言后三泰復姤言大人與上各一離剥先王者立法創制者之稱君子者有徳有位之通稱上者在人上者之通稱后者有天下者之通稱大人者徳位並至之稱此卦六五不為君位故指陽為上而不言后王先君子曰未有與者无應故也若在上者有以與之則為禍烈而君子无唯類也程子曰剥之未盛君子有與猶可勝也此意甚善第於文義若相戾耳況傳文與井九二畧同恐不應為兩說終不可用也此及豐九三兩言之大抵一意后即書所謂元后也省方即觀之省方也王氏以方為事張子以后為繼體守文之君疑皆失之義无咎也此及解漸既濟之初爻凡四言之意各有異蓋解漸自可无咎此及既濟則有謹戒之意耳未富也愚聞之邑人班邑新曰无妄之福未可以為富也固有之也益六三與此同豐之五兊之四言有慶畧與此同至於中有慶往有慶則各以其爻義言之若所謂大有慶者則有取義之爻各具本傳先君子曰畜極而通君子之道將盛行於世也程子以說為設問之辭道路之道疑皆未安耳亦可醜也此及解之三凡兩言之義蓋一耳得中道也解夬之九二皆言之離王公梁武帝讀離作平聲渙之六四渙其羣而傳曰光大也此爻憧憧往來與涣之四正相反故其辭然无所容與離九四同不可大事興豐其沛之意同蓋剛雖得位而不中是以不可大事小人否也以文攷之晦菴之說為順以韻叶之程子之音為得无所疑也此及升之九三並言之此決於退彼決於進時之冝耳爻辭言九二貞吉者三而此言以中解言得中道未濟言中以行正大意相類但各叶韻耳位不當也謂大壯之世以柔居尊失其壯矣傳文多舉首句所謂獨行正者乃并貞吉賛之也張子曰有應在四居下援上故曰未受命張子之意猶所謂賜不受命者也如此則與正見必摧之說又相反也先君子晦菴皆曰初在下位未有官守之命程子曰若有官守不信於上而失其職一日不可居也此言得之威如之吉與大有之傳畧同蓋夫子慮人以猛為威故特出此義先儒各自為說失之矣先君子曰離兊皆隂而性不同傳言睽中有合所以責君子濟睽之功象言同中有異所以論君子不苟同之性睽六五與晉六五同皆文明柔順虚中之主往則有慶王氏張子程子皆以為六四當位處隂之實先君子曰六四往蹇來連者以九三九五陽實居當其位而乗承之際實遇之耳此說極順陽剛中正雖居蹇難不失其莭所謂得道者多助也以從貴也與鼎之初六同義則稍異明兩作雷雨作二象皆當以作字為句程子誤也冝負而反乗與老婦士夫之醜同未當位也案諸爻失位者皆云位不當而此變其文者謂未當君位故但去其應也若進而之五則當盡去羣隂乃為得耳益之五損之上皆以益下為大得志與升子尊位者同聖人之意可見矣後漢向長讀損益二卦喟然歎曰吾今已知富不如貧貴不如賤但未知死何如生耳愚謂君子生順死安未聞以死為貴也貧賤之人固寡怨咎然得其志而大行於天下非逹而在上者能之乎長所言非易之意矣五比於六非其罪也但時位如此則中心歉然自以為未光耳晉之道未先萃之志未光與此大同而小異逺近亦以位言蓋二近而四逺也中正也與井之升同皆陽剛在上自然中正故不言以除本亦作儲又作治王肅姚氏陸氏曰除猶修治也未光釋文云一本作志未光以髙大一本髙字上有成字有慶有喜大意畧同所從言之異者恐以叶韻耳程傳所云已為平正必謂大賢以上命不足道但當不有其身則孔子微服孟子之有戒心皆為隠情惜己者矣致命如致知之致孔子言道之廢興即推致之謂恐與見危授命不同後見上饒余大雅正叔記晦菴語録云澤无水困不可以有為然後付之命與本義不同當考以居中而有福慶謂其得所欲之多也雖不當位彖與爻傳三言之小畜乃為无位此爻與未濟則為失位耳以中直也與同人之乾同義亦无異受福也與井之坎同未當也案歸妹之大壯賛辭同此以韻叶之皆為平聲則此言宜與需之小畜賛辭同義吉行也與豐九四之吉行大同小異此言亦為井地設勸相即相友相助相扶持之意時舎也與乾九二文言傳同王氏程子以文言為次舎之舎此為取舎之舎晦菴皆讀作上聲愚謂二卦音義固所當同但皆作去聲乃為愜耳時舎猶云時止順以從君小人之事也君子則可否相濟不但順從而已越五應上故為失義荆公曰資九二之中以為實醜類也三與初二為同體上比於四則離其類矣婦謂四自三論之四非㛰也乃冦也能禦之則與其類為能順以相保矣順以巽也此爻乃所以成巽者故云豐六二與大有九五賛辭同上下之位為少異耳剛失位而不中是以不可大事也喪牛之凶本或作喪牛于易晦菴曰或言中正或言正中蓋協韻也得願也與漸九五畧同澤上有水釋文云本作澤中有水者非先君子曰議獄如周官之八議愚謂緩死即三宥之意志未變與家人之漸同義志變則有他矣濡其首厲何可乆也二句自協韻厲字疑衍未濟征凶位不當也據此文則爻辭利渉大川上宜有不字釋文曰繫字從􅌛若從􅌛下糸者音口奚切非釋文曰王肅本作繫辭上傳記於雜卦皆有傳字晁吕氏定從古晦菴用之漢儒或以此篇為易大傳未詳所據司馬談論六經要指引天下殊塗而同歸一致而百慮謂之易大傳此今繫辭下傳中語也故相承以繫辭傳為大傳然劉向封事引易大傳曰誣神者殃及三世此豈繫辭傳中語乎意者秦漢諸儒自為易大傳如伏生尚書大傳之比其間引繫辭之文而談不考詳誤以為大傳耳亦猶差之毫釐繆以千里本易緯之文而漢儒所引乃冠以易曰二字鹵莽類此要不足據也坤作成物虞氏姚氏皆作坤化成物簡能姚氏曰能當作從繫辭焉而明吉凶虞氏本吉凶下有悔吝二字虞氏本作晝夜者剛柔之象也三極程子訓極為中陸氏曰極者至也馬氏曰三極三統也王肅曰隂陽剛柔仁義也鄭氏韓氏曰三才也本義從之京氏曰序次也陸氏曰象也虞氏本作象所樂虞本作所變説文云爻交也馬氏曰疵瑕也愚案小疵即前章所謂憂虞也韓氏曰爻之所謂曰位六位有貴賤案此言與首章貴賤位矣之意同而韓氏於首章乃以萬物貴賤之位釋之其失可見矣晦菴曰齊猶定也小謂隂大謂陽此本荆公説張子曰卦有稱名至小而與諸卦均齊者取類大也如此則下文當言卦无小大矣張子失之虞氏曰辨别也京氏曰明也王肅曰震動也馬氏曰驚也鄭氏曰懼也周氏曰救也京氏曰凖等也鄭氏曰中也平也大也天也陽也日也易也皆指乾也廣也地也隂也月也簡也皆指坤也晦菴曰成性本成之性也存存謂存而又存不已之意也張泳記晦菴語録云成性謂未甞作壞存存言常在此存之又存晦菴曰釋乾上九爻義當屬文言此蓋重出愚甞疑繫辭雜論諸爻似文言之未成者故其體絶相類然坤文言視乾已甚簡畧則他卦不必盡作豈聖人姑舉此諸爻以見義例如三陳九卦之比歟言語以為階姚氏階作機為易諸本多云作易今從釋文及朱本再扐而後掛此下傳文天數五至行鬼神也凡四十四字韓本屬於此下朱本移在此章之首蓋此章専論大衍之數揲蓍求卦之法不當以天地之數參錯乎其中也今依漢書律歴志文别自為章在後䇿釋文云亦作筴案蔡邕靈憲曰微星之數凡萬一千五百二十此雖无與於易亦可見天地自然之數矣變卦之數與焦贑易林合張葆光曰四千九十六卦凡七十三萬七千二百八十䇿祐荀氏作侑第十章案韓本此章止於可以祐神矣虞翻云此本美大衍四象之作而荀諝上為章首尤可怪笑裴松之云諝荀爽别名也程子亦云此句與上文相連今從程子晁吕朱本但遞降為第十蓋以分第八章為兩章故也以前章考之辭象皆居者之事也變占皆動者之事也制器如罔罟耜耒舟楫杵臼之類至精魏志桓階奏作至􅄨李守約記晦菴語録曰此言感通後言窮理盡性本論易非論人諸家皆借以論人亦通第十一章諸家皆止此但在韓本為第八程子晁吕氏本為第十耳案先儒言金木水火得土而成似未盡善鄭氏曰自五以上陽无耦隂无配未得相成六以下氣并則成矣其言是也第十二章案韓本天一至地十凡二十字繫於夫易何為者也之上而天數五至行鬼神也凡四十四字繫於再扐而後掛之下其文參錯不相貫屬故張子又曰聖人之於書亦有不欲一併説盡者或在此或在彼要終必見但俾學者潜心蓋謹之也晦菴則以為錯簡移此六十四字繫於大衍之數五十之上蓋合天地大衍之數為一章也今案鄭康成言易詩書春秋簡長尺二寸每簡三十字孝經半之論語簡八寸蓋古人簡冊字有定數每一簡三十字則錯一簡亦三十字近世諸儒於經文之可疑者類以錯簡名之然文章句多寡不齊恐非錯簡也但傳寫者偶失其次耳又案漢書律歴志引此文自天一至行鬼神也六十四字前後相連蓋班固之時本猶未錯今從韓本二十字无次而依律歴志本以四十四字附之庶文理變通又有依據也法象即前章所謂成象效法者也變通即此章所謂闔闢往來者也懸象著明言日月麗天垂象最著莫大乎蓍龜古本大作善後漢書楊賜傳云天垂象見吉凶聖人則之魏志辛毘等奏亦云天垂象見吉凶聖人則之河出圗洛出書聖人效之皆與韓本不同第十三章韓本連下章為第九晁吕本不連下章為第十一易曰自天祐之舊本繫之上章而无其說諸儒或通作一章誤矣右第十四章韓為第九朱晁吕本第十二第十五章韓為第十一朱為第十二晁吕鼓之舞之以上為第十三乾坤其易之緼以下為第十四今本定為十五章蓋次第從韓分合從朱理者不相侵亂之意且以稅斂言之什一者天下之正理也什而取二如魯之法則上侵下矣二十而取一如貊之道則下侵上矣皆非所謂理也後世興利之臣往往藉此説以文姦言故不可以不辨觀象觀法以作易言上篇仰觀俯察以用易言京氏曰耜耒下耓也耒耜上句木也耓勅丁反陸氏云廣五寸孟氏曰耨耘除草也説文云耜曲木垂所作豈神農始作未備而垂益之邪世本云祝融為市祝融顓頊臣在黄帝後恐誤或者神農創之祝融益修其政邪蓋懋遷有无禹亦舉行之耳張子謂易言制作之意止取義與象契非必見卦而後始有為也蓋先儒誤以為文王重卦故有此論而或者困益噬嗑之象又以為神農重卦龜山先生遂以為畫前之易其誤益以甚矣以全身也諸本作存身朱本從釋文死其将至其諸本作期今從釋文臨卭張文饒名行成乾道間為兵部郎中乃云三陳九卦者明天用二十七也序十三卦者明地用七十八也二十七者卦體也其爻用則百六十二者九九之合也七十八者爻用也其卦體則十三者閏歳之月也皆數之自然也其索合如此此程子所以置數而論理也李壽翁云以九居五以六居二位當之卦十有六宜无不利而二五之辭多艱以六居五以九居二位不當之卦十有六宜有悔吝而二五之辭多吉蓋君當用虚中以行其剛健臣當用剛中以行其柔順文言傳者十翼之第七篇也先儒以其首章八句與春秋傳所載穆姜之言不異疑非孔子之言故梁武帝以此篇為文王所作而吕氏音訓取朱内翰之說曰司馬遷謂孔子晚喜易序彖繫象說卦文言信斯言也則古有是言孔子文之而己晦菴曰疑古有是言穆姜稱之夫子亦有取焉故下文别以子曰表孔子之辭蓋傳者欲以明此章之為古語也愚案春秋傳乃戰國時人所作記獲麟後五十年事疑其取諸此傳如王肅采中庸為家語之比若謂下文加子曰字以明此章之為古語則繫辭說卦諸傳豈皆古語乎況繫辭傳文全體與此同故愚疑此二傳往往後人取夫子之說而彚次之故文勢莭目頗與中庸相似王氏注本附此篇於經卦末晁氏從古别出為傳今從之荀卿以括囊為腐儒之事不可謂之識時矣贊如贊化育之贊生如生八卦之生禇少孫補龜筴傳曰天下和平王道得而蓍莖長丈其生滿百莖漢儒之說如此今犍為郡田野閒生此蓍草一本百莖絶無餘支愚親觀之但長可二尺餘不盡如先儒之說也淮南子云上有叢蓍下有伏龜禇少孫云蓍生滿百莖者下必有神龜守之上常有青雲覆之洪範五行傳云蓍百年一本生百莖許叔重說文云蒿屬生千歳三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺王仲任論衡云七十歳生一莖七百歳生十莖神靈之物故生遲也陸璣毛詩草木䟽云似藾蕭青色科生本草蓍生少室山谷圗經云今蔡州上蔡縣曰龜祠其旁生如蒿作叢髙止六尺一本一二十莖多者三五十莖生便條重所以異於衆蒿也愚所見者嘉定府有之狀如蒿屬聞諸土人云其生亦如常草但一本百莖此為異也若如說文所云則三尺之蓍掛扐布筭己自不易況九尺乎唐本注云駮若馬鋸牙食虎豹取其至健也如此説則當云為駮不應有馬字荀九家有為牝為迷為方為囊為裳為黄為帛為漿牝隂物也迷先迷之意方地之形囊所以容物裳下服黄地之色帛桑土所生漿未詳其義九家艮為鼻身之止者背也面之止者鼻也張葆光曰八卦設而萬物之象備孔子陳之於説卦者蓋明其例耳非至於此也見於易者説卦有所不陳東於説卦者易有所不盡此可識其意矣作罔罟以佃以漁緯書出先漢既有罔字則隋唐本无者非也丙子學易編
