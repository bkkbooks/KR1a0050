body:
  text: 丙子學易編易類提要臣等謹案丙子學易編一卷宋李心傅撰心傳字㣲之號秀巖隆州人寳慶二年以布衣召補從政郎差充秘閣校勘歴官至工部侍郎兼秘書監事迹具宋史儒林傳心傳邃于史學有建炎以來繫年要録建炎以來朝野雜記二書為史家所重而經術亦頗究心髙斯得恥堂存稿有學易編誦詩訓二書跋曰秀巖先生近世大儒也世徒見其論著藏于明堂石室金匱玉版遂以良史目之不知先生中年以後窮極道奥經術之邃有非近世學士大夫所能及者雖弟子尊師之詞要非其溢美也是書于嘉定九年竭二百八十日之力排纂蕆業以嵗在丙子故以丙子為名所取惟王弼張子程子郭雍朱子五家之説而以其父舜臣易本傳之説證之亦間附以已意原書十五卷髙斯得嘗與誦詩訓合刻于桐江今已散佚此本為元初俞琰所鈔後有琰跋曰此書係借聞徳坊周家書肆所鬻者天寒日短老眼昏花併日而鈔其可取者云云盖所存不及十之一矣然琰邃于易學凡所採摭皆其英華則大㫖猶可㮣見也心傳自序稱採王氏張子程子與朱文公四家之傳而間以周子邵子及先君子之説補之自唐以上諸儒字義之異者亦附見焉而琰跋所列則無周子邵子而有郭子和子和郭雍之字即著郭氏傳家易説者也心傳原書不存未詳孰是考周子通書邵子皇極經世雖皆闡易理而實于易外别自為説可以引為義疏者少惟郭雍依經闡義具有成書或心傳之序傳寫有誤歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀丙子學易編序始心傳年四十餘朋友為言當讀易意忻焉樂之既而終日蒙然如眇者之視莫知易之為何書也後十年復取讀之首求諸王氏書多所未喻次考張子書乃粗窺其梗槩最後讀程子書則昭若掲蒙矣程子之書義理之㑹也然其言猶若不専為爻畫而出於是以先君子本傳暨晦菴先生本義參焉而後聖人畫卦命爻之情無復餘藴矣顧諸先生之言尚有不能盡同者因復頗為參釋隨日書之以備遺㤀閒有鄙見可以推明諸先生之說者亦附著之嗚呼程子尚矣先君子之學不肖孤不敢妄有稱賛晦菴書最後出世之學者往往未究其藴而反以象占之說為疑同志者於此儻有取焉然後知程朱二傳不可相無而晦菴之為書其條理愈密其意味愈長誠未可以驟窺而輕議也乃若先君子之說則類多與晦菴合第先君子専自聖人畫卦之意求之晦菴兼自聖人命爻之意求之此為小異要亦相表裏耳嘉定九年嵗次丙子春三月甲申陵陽李心傳謹序
