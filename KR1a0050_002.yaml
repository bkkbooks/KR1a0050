body:
  text: 丙子學易編後序右學易編十五卷起丙子月正元日盡是嵗除夕凡三百八十有四日其間齋祠賔旅寒暑疾病事役居十之三為功蓋二百八十日也案唐書藝文志易自卜商傳以下凡八十五家中興館閣書目百有十二家其説之多至於如此而近世為是説者復數十家尚未著録也然是編之作特取王氏張子程子與朱文公四家之傳而間以周子邵子及先君子之説補之自唐以上諸儒字義之異者亦附見焉其有得於心思可助諸先生之説者十一二也編成撫之而歎曰於呼易道逺矣上古之經莫尊於易而諸儒多以私意亂之蓋東周之時以象占言易而亂於支離兩漢之際以讖緯言易而亂於傅會魏晉之間以名理言易而亂於虗無近世以來以人事言易而亂於穿鑿皆易之蠧也蓋盈天地之間者理與氣而已矣然有是氣則必有是理有是理則必有是象有是象而後有是數有是數而後有是占有是占而後有是辭故易有聖人之道四而變象占居三馬變也者言乎爻之動者也象也者言乎卦之像者也占也者言乎蓍之決者也自伏羲作卦以前民用文王周公繫辭焉而明吉凶使後之人觀消息盈虗之理審進退存亡之義而不迷於吉凶悔吝之途聖人之憂患後世可謂至矣自周之衰言易者寖失羲文之意而牽合破碎或反資以為亂故夫子作十翼專以義理明之其後讖緯之學典而飛伏互體之文壬遁九宫之説紛然並出皆託易以行世至王輔嗣乃獨辭而闢之其視兩漢諸儒可謂賢矣惜其溺於時好乃取莊老之妄以亂周孔之實故易之道終不明於世寥寥千載有程夫子出乃始以人事之實理明之其有功於易則已宏矣然程之所傳者辭也辨吉凶者存乎辭而理固在其中矣而後之學者沿文生義各自為説復失聖人繫辭之本意故晦菴先生出又專以聖人立卦生爻之大旨明之自程朱二子之書成而四聖人之道始大彰明較著而無所蔽矣顧恨世之學者未能窮究是書往往以其一時推求考索測度髣佛之言而反疑前賢終身篤學研思精微至到之論若是者愚竊大懼故復述其所聞識於編端以示子姓而同志之士可與共學者亦所不隱焉
